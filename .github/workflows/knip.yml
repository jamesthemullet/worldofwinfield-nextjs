name: Knip
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: yarn install
      - name: Run knip
        run: yarn knip
